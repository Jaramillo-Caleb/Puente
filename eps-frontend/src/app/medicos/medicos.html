<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold text-primary m-0">ESTA ES LA PAGINA DE MEDICOS</h1>

        <button type="button" class="btn btn-primary shadow-sm" (click)="abrirModal()">
            Agregar Medicos
        </button>
    </div>

    <div class="contenedor-tabla card shadow border-0">
        <div class="card-body p-0">
            <table class="tabla-usuarios table table-hover table-striped table-bordered align-middle mb-0">
                <thead class="table-dark text-center">
                    <tr>
                        <th>Cédula</th>
                        <th>Nombre</th>
                        <th>Apellidos</th>
                        <th>Especialidad</th>
                    </tr>
                </thead>

                <tbody class="text-center">
                    @for (i of medicos; track i.cedula){
                    <tr>
                        <td>{{i.cedula}}</td>
                        <td>{{i.nombre}}</td>
                        <td>{{i.apellido}}</td>
                        <td>{{i.especialidad}}</td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
<div class="modal" tabindex="-1" id="registro">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nuevo Medico</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="cerrarModal()"></button>
            </div>
            <div class="modal-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label">Cedula</label>
                        <input for="inputCedula" type="text" class="form-control" [(ngModel)]="medico.cedula" name="cedula">

                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input for="inputNombre" type="text" class="form-control" [(ngModel)]="medico.nombre" name="nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Apellidos</label>
                        <input for="inputApellidos" type="text" class="form-control" [(ngModel)]="medico.apellido" name="apellidos">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Especialidad</label>
                        <input for="inputEspecialidad" type="text" class="form-control" [(ngModel)]="medico.especialidad" name="especialidad">
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary" (click)="cerrarModal()">Cancelar</button>
                        <button type="submit" class="btn btn-primary" (click)="guardarMedico()">Guardar</button>

                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
