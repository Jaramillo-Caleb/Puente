<section class="hero-section d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="text-center mb-4">
      <h1 class="text-white fw-bold display-5">Encuentra tu próximo trayecto</h1>
    </div>

    <div class="search-container bg-white p-4 shadow-lg rounded-4">
      <div class="row g-3 align-items-end">
        
        <div class="col-md-4">
          <label class="form-label small fw-bold text-navy text-uppercase mb-2">Destino</label>
          <input type="text" class="form-control custom-input py-3 px-4" 
                 [(ngModel)]="destino" name="destino"
                 placeholder="Ej: Pereira, Medellín...">
        </div>

        <div class="col-md-4">
          <label class="form-label small fw-bold text-navy text-uppercase mb-2">Fecha</label>
          <input type="date" class="form-control custom-input py-3 px-4" 
                 [(ngModel)]="fecha" name="fecha">
        </div>

        <div class="col-md-4">
          <button (click)="buscar()" class="btn btn-buscar-viajes w-100 py-3 fw-bold text-uppercase shadow-sm">
            Buscar Viajes
          </button>
        </div>

      </div>
    </div>
  </div>
</section>

<div class="container mt-5 mb-5">
  
  @if (!buscado) {
    <div class="text-center py-5 animate-fade-in">
      <div class="empty-state-icon mb-3">
        <i class="bi bi-map text-muted display-1"></i>
      </div>
      <h3 class="text-secondary fw-light">¿A dónde quieres viajar hoy?</h3>
      <p class="text-muted">Selecciona un destino y una fecha para ver los viajes disponibles.</p>
    </div>
  } @else {
    <div class="results-area animate-fade-in">
       <h2 class="h4 fw-bold text-navy mb-4">Resultados para {{destino}}</h2>
       <!-- Aqui se va a meter las tarjetas de los viajes -->
    </div>
  }

</div>
